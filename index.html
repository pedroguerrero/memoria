<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Juego de Memoria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Roboto', Arial, sans-serif;
        background: #f0ece3;
        color: #1a1a1a;
        min-height: 100vh;
        padding: 1.5rem 1rem 3rem;
      }

      /* ── Encabezado ─────────────────────────────────── */
      .cabecera {
        text-align: center;
        margin-bottom: 1.5rem;
      }
      .cabecera h1 {
        font-size: 30px;
        font-weight: normal;
        color: #2c2c2c;
        letter-spacing: 0.01em;
      }
      .cabecera p {
        font-family: 'Roboto', Arial, sans-serif;
        font-size: 16px;
        color: #666;
        margin-top: 4px;
      }

      /* ── Panel de control ───────────────────────────── */
      .panel {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 1.5rem;
      }
      .stat-box {
        background: #fff;
        border: 1px solid #d9d4c7;
        border-radius: 10px;
        padding: 10px 22px;
        text-align: center;
        min-width: 110px;
      }
      .stat-num {
        font-size: 26px;
        font-weight: bold;
        font-family: 'Roboto', Arial, sans-serif;
        color: #2c6e49;
      }
      .stat-lbl {
        font-family: 'Roboto', Arial, sans-serif;
        font-size: 13px;
        color: #888;
        margin-top: 2px;
      }

      /* Selector de nivel */
      .nivel-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: 'Roboto', Arial, sans-serif;
        font-size: 15px;
        color: #555;
      }
      .nivel-wrap select {
        font-family: 'Roboto', Arial, sans-serif;
        font-size: 16px;
        padding: 8px 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        background: #fff;
        color: #1a1a1a;
        cursor: pointer;
      }

      .btn {
        font-family: 'Roboto', Arial, sans-serif;
        font-size: 17px;
        padding: 12px 28px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        transition:
          background 0.15s,
          transform 0.1s;
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn-nuevo {
        background: #2c6e49;
        color: #fff;
      }
      .btn-nuevo:hover {
        background: #235a3b;
      }

      /* ── Tablero ────────────────────────────────────── */
      .tablero {
        display: grid;
        gap: 14px;
        max-width: 680px;
        margin: 0 auto;
        justify-content: center;
      }
      /* columnas según nivel */
      .cols-4 {
        grid-template-columns: repeat(4, 130px);
      }
      .cols-5 {
        grid-template-columns: repeat(5, 120px);
      }
      .cols-6 {
        grid-template-columns: repeat(6, 110px);
      }

      /* ── Carta ──────────────────────────────────────── */
      .carta {
        perspective: 800px;
        cursor: pointer;
      }
      .carta-interior {
        position: relative;
        width: 100%;
        height: 130px;
        transform-style: preserve-3d;
        transition: transform 0.45s ease;
        border-radius: 12px;
      }
      .carta.volteada .carta-interior,
      .carta.encontrada .carta-interior {
        transform: rotateY(180deg);
      }

      .cara {
        position: absolute;
        inset: 0;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
      }

      /* Dorso */
      .dorso {
        background: #4a7c59;
        border: 2px solid #3a6347;
        font-size: 44px;
        color: #2c4a35;
      }
      .dorso::after {
        content: '?';
        font-family: Georgia, serif;
        font-size: 52px;
        font-weight: bold;
        color: rgba(255, 255, 255, 0.6);
      }

      /* Frente */
      .frente {
        background: #fff;
        border: 2px solid #c8c0b0;
        transform: rotateY(180deg);
        font-size: 60px;
        flex-direction: column;
        gap: 0;
      }
      /* nivel 5 y 6: emoji un poco más pequeño */
      .cols-5 .frente {
        font-size: 50px;
      }
      .cols-6 .frente {
        font-size: 44px;
      }

      .carta.encontrada .dorso {
        background: #e8f5ee;
        border-color: #9fcfb2;
      }
      .carta.encontrada .frente {
        background: #e8f5ee;
        border-color: #9fcfb2;
      }
      .carta.error .carta-interior {
        animation: sacudir 0.4s ease;
      }

      @keyframes sacudir {
        0%,
        100% {
          transform: rotateY(180deg) translateX(0);
        }
        20% {
          transform: rotateY(180deg) translateX(-8px);
        }
        60% {
          transform: rotateY(180deg) translateX(8px);
        }
      }

      /* ── Mensaje de victoria ────────────────────────── */
      .victoria {
        display: none;
        max-width: 480px;
        margin: 2rem auto 0;
        background: #fff;
        border: 1px solid #d9d4c7;
        border-radius: 14px;
        padding: 2.5rem 2rem;
        text-align: center;
      }
      .victoria.show {
        display: block;
      }
      .victoria-emoji {
        font-size: 56px;
        margin-bottom: 12px;
      }
      .victoria h2 {
        font-size: 26px;
        font-weight: normal;
        color: #2c2c2c;
        margin-bottom: 8px;
      }
      .victoria p {
        font-family: 'Roboto', Arial, sans-serif;
        font-size: 17px;
        color: #555;
        margin-bottom: 1.5rem;
        line-height: 1.55;
      }

      @media (max-width: 540px) {
        .cols-4 {
          grid-template-columns: repeat(4, 1fr);
          gap: 10px;
        }
        .cols-5 {
          grid-template-columns: repeat(4, 1fr);
          gap: 10px;
        }
        .cols-6 {
          grid-template-columns: repeat(4, 1fr);
          gap: 10px;
        }
        .carta-interior {
          height: 90px;
        }
        .frente {
          font-size: 40px !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="cabecera">
      <h1>Juego de Memoria</h1>
      <p>Encuentra todos los pares iguales</p>
    </div>

    <div class="panel">
      <div class="stat-box">
        <div class="stat-num" id="intentos">0</div>
        <div class="stat-lbl">Intentos</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="pares-enc">0</div>
        <div class="stat-lbl">Pares encontrados</div>
      </div>
      <div class="nivel-wrap">
        <label for="nivel">Nivel:</label>
        <select id="nivel" onchange="nuevaPartida()">
          <option value="facil">Fácil (8 pares)</option>
          <option value="normal" selected>Normal (10 pares)</option>
          <option value="dificil">Difícil (15 pares)</option>
        </select>
      </div>
      <button class="btn btn-nuevo" onclick="nuevaPartida()">
        Nueva partida
      </button>
    </div>

    <div class="tablero" id="tablero"></div>
    <div class="victoria" id="victoria">
      <div class="victoria-emoji">🌟</div>
      <h2>¡Muy bien!</h2>
      <p id="victoria-msg"></p>
      <button class="btn btn-nuevo" onclick="nuevaPartida()">
        Jugar de nuevo
      </button>
    </div>

    <script>
      const EMOJIS = [
        '🌸',
        '🦋',
        '🐘',
        '🌻',
        '🐬',
        '🦁',
        '🍎',
        '🌈',
        '🐢',
        '🌙',
        '⭐',
        '🍓',
        '🦜',
        '🌺',
        '🐠',
        '🍀',
        '🦒',
        '🌍',
        '🍇',
        '🐧',
        '🦊',
        '🌵',
        '🍋',
        '🐝',
        '🦅',
        '🌷',
        '🐙',
        '🍁',
        '🦌',
        '🌊',
      ];

      const CONFIG = {
        facil: { pares: 8, cols: 'cols-4' },
        normal: { pares: 10, cols: 'cols-5' },
        dificil: { pares: 15, cols: 'cols-6' },
      };

      let voltTeadas = [],
        encontradas = 0,
        intentos = 0,
        bloqueado = false,
        totalPares = 0;

      function mezclar(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function nuevaPartida() {
        const nivel = document.getElementById('nivel').value;
        const { pares, cols } = CONFIG[nivel];
        totalPares = pares;
        intentos = 0;
        encontradas = 0;
        voltTeadas = [];
        bloqueado = false;

        document.getElementById('intentos').textContent = '0';
        document.getElementById('pares-enc').textContent = '0';
        document.getElementById('victoria').classList.remove('show');

        const selec = mezclar(EMOJIS).slice(0, pares);
        const cartas = mezclar([...selec, ...selec]);

        const tablero = document.getElementById('tablero');
        tablero.className = 'tablero ' + cols;
        tablero.innerHTML = '';

        cartas.forEach((emoji, i) => {
          const carta = document.createElement('div');
          carta.className = 'carta';
          carta.dataset.emoji = emoji;
          carta.dataset.idx = i;
          carta.innerHTML = `
      <div class="carta-interior">
        <div class="cara dorso"></div>
        <div class="cara frente">${emoji}</div>
      </div>`;
          carta.addEventListener('click', () => voltear(carta));
          tablero.appendChild(carta);
        });
      }

      function voltear(carta) {
        if (bloqueado) return;
        if (carta.classList.contains('volteada')) return;
        if (carta.classList.contains('encontrada')) return;

        carta.classList.add('volteada');
        voltTeadas.push(carta);

        if (voltTeadas.length === 2) {
          bloqueado = true;
          intentos++;
          document.getElementById('intentos').textContent = intentos;

          const [a, b] = voltTeadas;
          if (a.dataset.emoji === b.dataset.emoji) {
            setTimeout(() => {
              a.classList.add('encontrada');
              b.classList.add('encontrada');
              a.classList.remove('volteada');
              b.classList.remove('volteada');
              encontradas++;
              document.getElementById('pares-enc').textContent = encontradas;
              voltTeadas = [];
              bloqueado = false;
              if (encontradas === totalPares) mostrarVictoria();
            }, 500);
          } else {
            setTimeout(() => {
              a.classList.add('error');
              b.classList.add('error');
              setTimeout(() => {
                a.classList.remove('volteada', 'error');
                b.classList.remove('volteada', 'error');
                voltTeadas = [];
                bloqueado = false;
              }, 500);
            }, 800);
          }
        }
      }

      function mostrarVictoria() {
        const v = document.getElementById('victoria');
        const msgs = [
          `Lo logró en ${intentos} intentos. ¡Excelente memoria!`,
          `${intentos} intentos para completarlo. ¡Muy bien hecho!`,
          `Con ${intentos} intentos encontró todos los pares. ¡Admirable!`,
        ];
        document.getElementById('victoria-msg').textContent =
          msgs[Math.floor(Math.random() * msgs.length)];
        v.classList.add('show');
        v.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }

      nuevaPartida();
    </script>
  </body>
</html>
